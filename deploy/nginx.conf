server {
    listen 80;
    listen [::]:80;
    server_name doyouknow.app www.doyouknow.app;
    root /var/www/doyouknow.app;
    index index.html;

    charset utf-8;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location = / { return 302 /en/; }
    location / { try_files $uri $uri/ =404; }
    error_page 404 /404.html;

    location ~* \.(?:css|js|svg|webp|avif|png|jpg|jpeg|gif|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
