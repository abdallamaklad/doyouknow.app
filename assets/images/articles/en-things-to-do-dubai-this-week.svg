    <rect x="360" y="440" width="140" height="100" rx="8" opacity="0.8"/>
    <rect x="520" y="440" width="140" height="100" rx="8" opacity="0.8"/>
    <rect x="680" y="440" width="140" height="100" rx="8" opacity="0.8"/>
    <rect x="840" y="440" width="140" height="100" rx="8" opacity="0.8"/>
  </g>
  <!-- Calendar day labels -->
  <g font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#94A3B8" text-anchor="middle">
