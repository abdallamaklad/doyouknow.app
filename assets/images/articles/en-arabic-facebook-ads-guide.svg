<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Arabic Facebook Ads Guide: Target Arab Professionals — doyouknow.app illustration</title>
  <desc id="desc">Original doyouknow.app editorial artwork for Arabic Facebook Ads Guide: Target Arab Professionals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="22%" r="58%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#fff" opacity=".16"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity=".38"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="900" cy="150" r="320" fill="url(#glow)"/>
  
  <!-- Social media icon representation -->
  <g transform="translate(500, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="200" rx="40" fill="white" opacity="0.15"/>
    <rect x="20" y="20" width="160" height="160" rx="30" fill="white" opacity="0.25"/>
    <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">f</text>
  </g>
  
  <!-- Target/bullseye icon -->
  <g transform="translate(760, 200)" opacity="0.8">
    <circle cx="80" cy="80" r="70" fill="none" stroke="white" stroke-width="8" opacity="0.6"/>
    <circle cx="80" cy="80" r="45" fill="none" stroke="white" stroke-width="6" opacity="0.5"/>
    <circle cx="80" cy="80" r="20" fill="white" opacity="0.3"/>
    <circle cx="80" cy="80" r="8" fill="#F59E0B"/>
  </g>
  
  <!-- Arabic text accent -->
  <text x="600" y="520" text-anchor="middle" font-family="'Cairo', 'Tajawal', Arial, sans-serif" font-size="28" font-weight="600" fill="white" opacity="0.7">دليل إعلانات فيسبوك للمحترفين العرب</text>
  
  <!-- Main title -->
  <text x="600" y="580" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="36" font-weight="700" fill="white">Facebook Ads Guide for Arab Professionals</text>
  
  <!-- doyouknow.app branding -->
  <text x="600" y="640" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.6">doyouknow.app</text>
</svg>