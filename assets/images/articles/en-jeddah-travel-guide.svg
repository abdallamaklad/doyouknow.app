<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="40%" stop-color="#D4734F"/>
      <stop offset="70%" stop-color="#E8A87C"/>
      <stop offset="100%" stop-color="#F4D03F"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E86AB"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <rect x="0" y="420" width="1200" height="255" fill="url(#sea)"/>
  <!-- Sun -->
  <circle cx="900" cy="350" r="70" fill="#F4D03F" opacity="0.9"/>
  <!-- Jeddah skyline silhouette -->
  <path d="M0 420 L60 380 L100 400 L140 360 L180 390 L220 350 L260 380 L300 340 L340 370 L380 330 L420 360 L460 320 L500 350 L540 310 L580 340 L620 300 L660 330 L700 290 L740 320 L780 280 L820 310 L860 270 L900 300 L940 260 L980 290 L1020 250 L1060 280 L1100 240 L1140 270 L1180 230 L1200 250 L1200 420 Z" fill="#0F172A" opacity="0.6"/>
  <!-- Al-Balad style buildings -->
  <rect x="150" y="340" width="40" height="80" fill="#8B4513" opacity="0.5"/>
  <rect x="200" y="320" width="35" height="100" fill="#A0522D" opacity="0.5"/>
  <rect x="250" y="350" width="45" height="70" fill="#8B4513" opacity="0.5"/>
  <rect x="850" y="310" width="50" height="110" fill="#CD853F" opacity="0.5"/>
  <rect x="920" y="330" width="40" height="90" fill="#A0522D" opacity="0.5"/>
  <!-- Mosque silhouette -->
  <ellipse cx="600" cy="390" rx="80" ry="30" fill="#F4D03F" opacity="0.3"/>
  <rect x="560" y="300" width="80" height="90" fill="#0F172A" opacity="0.4"/>
  <rect x="585" y="270" width="30" height="30" fill="#0F172A" opacity="0.4"/>
  <rect x="570" y="280" width="8" height="50" fill="#0F172A" opacity="0.4"/>
  <rect x="622" y="280" width="8" height="50" fill="#0F172A" opacity="0.4"/>
  <!-- Decorative mashrabiya pattern -->
  <g fill="#D4734F" opacity="0.2">
    <rect x="100" y="450" width="15" height="40"/>
    <rect x="120" y="440" width="15" height="50"/>
    <rect x="140" y="460" width="15" height="30"/>
    <rect x="160" y="450" width="15" height="40"/>
    <rect x="1050" y="450" width="15" height="40"/>
    <rect x="1070" y="440" width="15" height="50"/>
    <rect x="1090" y="460" width="15" height="30"/>
  </g>
  <!-- Text -->
  <text x="600" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#FFFFFF" letter-spacing="4">JEDDAH</text>
  <text x="600" y="565" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#F4D03F" letter-spacing="2">The Gateway to Mecca</text>
  <text x="600" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8" letter-spacing="1">COMPLETE TRAVEL GUIDE</text>
</svg>
